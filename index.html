<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Bible Quiz</title>
    <style>
      :root {
        --bg: #f6f7f8;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #2ea1a5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 40px 20px;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, sans-serif;
        line-height: 1.7;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 24px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
      }

      h1 {
        margin-top: 0;
        line-height: 1.3;
      }

      p {
        font-size: 1rem;
      }

      .meta {
        color: var(--muted);
      }

      ul {
        padding-left: 20px;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Daily Bible Quiz</h1>
      <p class="meta">매일 말씀 퀴즈 지원 문서</p>

      <p>앱 관련 공개 문서 링크입니다.</p>

      <ul>
        <li><a href="./support.html">지원 페이지</a></li>
        <li><a href="./privacy.html">개인정보처리방침</a></li>
      </ul>
    </main>
  </body>
</html>
